<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/brand_logo.svg" type="image/x-icon" />
    <title>RemindrAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <script>
      (function () {
        "use strict";

        const LOCAL_STORAGE_THEME_KEY = "remindrai-theme";
        const FALLBACK_THEME = "light";

        function getSystemTheme() {
          try {
            if (typeof window !== "undefined" && window.matchMedia) {
              return window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            }
          } catch (e) {}
          return FALLBACK_THEME;
        }

        function getStoredTheme() {
          try {
            return localStorage.getItem(LOCAL_STORAGE_THEME_KEY) || "auto";
          } catch (e) {
            return "auto";
          }
        }

        function applyTheme() {
          try {
            const storedTheme = getStoredTheme();
            const systemTheme = getSystemTheme();
            const effectiveTheme =
              storedTheme === "auto" ? systemTheme : storedTheme;

            const root = document.documentElement;

            root.classList.remove("dark");
            if (effectiveTheme === "dark") {
              root.classList.add("dark");
            }

            document.documentElement.style.backgroundColor =
              effectiveTheme === "dark" ? "#000000" : "#ffffff";
            document.body &&
              (document.body.style.backgroundColor =
                effectiveTheme === "dark" ? "#000000" : "#ffffff");

            return { storedTheme, effectiveTheme, systemTheme };
          } catch (e) {
            document.documentElement.classList.remove("dark");
            return {
              storedTheme: "light",
              effectiveTheme: "light",
              systemTheme: "light",
            };
          }
        }

        const initialTheme = applyTheme();

        function setupSystemThemeListener() {
          try {
            if (typeof window !== "undefined" && window.matchMedia) {
              const mediaQuery = window.matchMedia(
                "(prefers-color-scheme: dark)",
              );
              const handleSystemThemeChange = () => {
                if (getStoredTheme() === "auto") applyTheme();
              };
              if (mediaQuery.addEventListener) {
                mediaQuery.addEventListener("change", handleSystemThemeChange);
              } else if (mediaQuery.addListener) {
                mediaQuery.addListener(handleSystemThemeChange);
              }
              return mediaQuery;
            }
          } catch (e) {}
          return null;
        }

        const mediaQuery = setupSystemThemeListener();

        if (typeof window !== "undefined") {
          window.__remindrai_THEME_DEBUG__ = {
            initialTheme,
            applyTheme,
            getStoredTheme,
            getSystemTheme,
            mediaQuery,
          };
        }

        const style = document.createElement("style");
        style.textContent = `
          * {
            transition: background-color 0s !important,
                        color 0s !important,
                        border-color 0s !important,
                        box-shadow 0s !important,
                        opacity 0s !important,
                        transform 0s !important;
          }
          html.no-transition * { transition: none !important; }
        `;
        document.head.appendChild(style);
        document.documentElement.classList.add("no-transition");

        window.addEventListener("load", function () {
          setTimeout(() => {
            document.documentElement.classList.remove("no-transition");
            style.remove();
          }, 100);
        });
      })();
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
